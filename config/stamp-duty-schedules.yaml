# Verify before use. v0.2 expands to 28 states + UTs.

last_verified: 2026-05-19

maharashtra:
  act: "Bombay Stamp Act 1958"
  documents:
    founders_agreement:
      article: "5(h)(A)(iv)"
      duty: 100
      type: fixed
    employment_contract:
      article: "5(h)(A)(iv)"
      duty: 100
      type: fixed
    offer_letter:
      article: "5(h)(A)(iv)"
      duty: 100
      type: fixed
    moa:
      article: 10
      duty: 500
      type: fixed
      note: "For nominal capital up to Rs. 1,00,000. Ad valorem for higher."
    aoa:
      article: 10
      duty: 500
      type: fixed
    isafe_ccps:
      article: 27
      duty_percent: 0.05
      type: ad_valorem
      basis: investment_amount
    sha:
      article: "5(h)(A)(iv)"
      duty: 100
      type: fixed
      note: "If no monetary consideration. SHA with share transfer = Article 62."
    sha_with_transfer:
      article: 62
      duty_percent: 0.25
      type: ad_valorem
      basis: consideration
    nda:
      article: "5(h)(A)(iv)"
      duty: 100
